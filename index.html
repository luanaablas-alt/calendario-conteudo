/* ============================================================
   STATE + STORAGE
============================================================ */
const STORE_KEY = 'cc_calendar_v1';
const today = new Date();
let state = {
  title: 'Calendário de Conteúdo',
  sub: 'Planejamento mensal de postagens',
  posts: [],
};
let view = { y: today.getFullYear(), m: today.getMonth() };
let readonly = false;
let clientMode = false;

/* feedback store — kept SEPARATE from content so the social media edits posts
   and the client only adds approval + comments, with no conflict */
const FB_KEY = 'cc_feedback_v1';
let feedback = {};
function loadFeedback() {
  try { const raw = localStorage.getItem(FB_KEY); if (raw) feedback = JSON.parse(raw); } catch(e) {}
  if (window.__FEEDBACK__ && Object.keys(feedback).length === 0) feedback = JSON.parse(JSON.stringify(window.__FEEDBACK__));
}
function saveFeedback() { try { localStorage.setItem(FB_KEY, JSON.stringify(feedback)); } catch(e) {} }
function fbOf(id) { return feedback[id] || { approval:'aguardando', notes:[] }; }
function getApproval(id) { return (feedback[id] && feedback[id].approval) || 'aguardando'; }
function getNotes(id) { return (feedback[id] && feedback[id].notes) || []; }
function setApproval(id, status) { const f = feedback[id] || (feedback[id] = { approval:'aguardando', notes:[] }); f.approval = status; saveFeedback(); }
function addNote(id, text) { const f = feedback[id] || (feedback[id] = { approval:'aguardando', notes:[] }); f.notes = f.notes || []; f.notes.push({ ts: Date.now(), text }); saveFeedback(); }

function load() {
  loadFeedback();
  // Shared/client file injected data takes priority
  if (window.__SHARED__) {
    state = window.__SHARED__;
    readonly = true;
    clientMode = true;
    if (state.posts && state.posts.length) {
      const d = parseYMD(state.posts[0].date);
      view = { y: d.getFullYear(), m: d.getMonth() };
    }
    return;
  }
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch(e) {}
}
function save() {
  if (readonly) return;
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
  syncToServerIfLinked();
}

const SUPABASE_URL = 'https://ibeiotkkjzvpbjrpuyma.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZWlvdGtranp2cGJqcnB1eW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDc2MzgsImV4cCI6MjA5OTY4MzYzOH0.jQV3GXFJOBdY2YYnneXvdfGcem9VIgZyi6lz2ckRXEs';
const ADMIN_TOKEN_KEY = 'cc_admin_token_v1';
const CLIENT_TOKEN_KEY = 'cc_client_token_v1';

let supabaseClient = null;
try {
  if (window.supabase && window.supabase.createClient) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e) {}

async function ensureServerLink() {
  let adminToken = localStorage.getItem(ADMIN_TOKEN_KEY);
  let clientToken = localStorage.getItem(CLIENT_TOKEN_KEY);
  if (adminToken && clientToken) return { adminToken, clientToken };
  if (!supabaseClient) throw new Error('Supabase indisponível');
  const { data, error } = await supabaseClient.rpc('cc_create_calendar');
  if (error || !data || !data.length) throw error || new Error('Falha ao criar link');
  adminToken = data[0].admin_token;
  clientToken = data[0].client_token;
  localStorage.setItem(ADMIN_TOKEN_KEY, adminToken);
  localStorage.setItem(CLIENT_TOKEN_KEY, clientToken);
  return { adminToken, clientToken };
}

async function publishToServer() {
  const adminToken = localStorage.getItem(ADMIN_TOKEN_KEY);
  if (!adminToken || !supabaseClient) return;
  try {
    await supabaseClient.rpc('cc_publish_calendar', {
      p_admin_token: adminToken,
      p_title: state.title,
      p_sub: state.sub,
      p_posts: state.posts
    });
  } catch(e) {}
}

function syncToServerIfLinked() {
  if (readonly) return;
  if (!localStorage.getItem(ADMIN_TOKEN_KEY)) return;
  publishToServer();
}

async function loadFromClientToken(token) {
  if (!supabaseClient) return false;
  try {
    const { data, error } = await supabaseClient.rpc('cc_get_calendar', { p_client_token: token });
    if (error || !data || !data.length) return false;
    const row = data[0];
    state = { title: row.title, sub: row.sub, posts: row.posts || [] };
    feedback = row.feedback || {};
    window.__SERVER_CLIENT_TOKEN__ = token;
    clientMode = true;
    readonly = true;
    if (state.posts && state.posts.length) {
      const d = parseYMD(state.posts[0].date);
      view = { y: d.getFullYear(), m: d.getMonth() };
    }
    return true;
  } catch(e) { return false; }
}

async function syncFeedbackToServerIfLinked() {
  const token = window.__SERVER_CLIENT_TOKEN__;
  if (!token || !supabaseClient) return;
  try {
    await supabaseClient.rpc('cc_submit_feedback', { p_client_token: token, p_feedback: feedback });
  } catch(e) {}
}

async function copyClientLink() {
  let url;
  try {
    const { clientToken } = await ensureServerLink();
    await publishToServer();
    url = `${location.origin}${location.pathname}?c=${clientToken}`;
  } catch (e) {
    // Falha real: não deu pra criar/publicar o calendário no servidor.
    toast('Não foi possível gerar o link agora — verifique a conexão');
    return;
  }
  // A partir daqui o link já existe e está publicado. Copiar para a área de
  // transferência é só uma conveniência — se falhar (permissão do navegador,
  // por exemplo depois de duas chamadas de rede o "gesto do usuário" pode
  // expirar), mostramos o link pra copiar manualmente em vez de dar erro.
  try {
    if (!navigator.clipboard || !navigator.clipboard.writeText) throw new Error('sem clipboard API');
    await navigator.clipboard.writeText(url);
    toast('Link do cliente copiado!');
  } catch (e) {
    window.prompt('Não deu pra copiar automaticamente. Copie o link abaixo:', url);
  }
}

const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function ymd(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseYMD(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function uid(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function postsFor(dateStr){ return state.posts.filter(p => p.date === dateStr).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')); }
function isToday(y,m,d){ return y===today.getFullYear() && m===today.getMonth() && d===today.getDate(); }

let toastT;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.add('hidden'), 2200);
}

function chip(label, c, opts={}) {

  const dot = opts.dot ? `<span class="w-1.5 h-1.5 rounded-full shrink-0" style="background:${c.dot}"></span>` : '';
  return `<span class="inline-flex items-center gap-1 rounded-md font-semibold ${sz} whitespace-nowrap" style="background:${c.bg};color:${c.fg}">${dot}${esc(label)}</span>`;
}
function fmtIcon(fmt, cls) {
  const p = {
    reels:'<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/>',
    story:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/>',
    carrossel:'<rect width="13" height="13" x="8" y="8" rx="2"/><path d="M4 16V6a2 2 0 0 1 2-2h10"/>',
    estatico:'<rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="1.6"/><path d="m21 15-3.5-3.5L9 20"/>',
  }[fmt] || '';
  return `<svg class="${cls||'w-3.5 h-3.5'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}
function fmtTs(ts) {
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function approvalBadge(id) {
  const a = getApproval(id);
  if (a === 'aguardando') return '';

  const path = a === 'aprovado' ? '<path d="M20 6 9 17l-5-5"/>' : '<path d="M12 9v4M12 17h.01"/>';

/* ============================================================
   RENDER — calendar grid (desktop)
============================================================ */
function renderGrid() {
  $('#weekHead').innerHTML = WEEKDAYS.map(d =>
    `<div class="px-3 py-2.5 text-[11.5px] font-bold uppercase tracking-wide text-faint">${d}</div>`
  ).join('');

  const first = new Date(view.y, view.m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(view.y, view.m+1, 0).getDate();
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startDow + 1;
    const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
    const isLastCol = (i % 7) === 6;
    const isLastRow = i >= totalCells - 7;
    const borders = `${isLastCol?'':'border-r'} ${isLastRow?'':'border-b'} border-line`;

    if (!inMonth) {
      html += `<div class="${borders} bg-line2/30 min-h-[116px]"></div>`;
      continue;
    }
    const dateStr = ymd(view.y, view.m, dayNum);
    const ps = postsFor(dateStr);
    const tdy = isToday(view.y, view.m, dayNum);

    const numEl = tdy
      ? `<span class="w-6 h-6 grid place-items-center rounded-full bg-accent text-white text-[12.5px] font-bold">${dayNum}</span>`
      : `<span class="text-[13px] font-semibold ${ps.length?'text-ink':'text-faint'}">${dayNum}</span>`;

    const shown = ps.slice(0,3).map(p => postChip(p)).join('');
    const more = ps.length > 3 ? `<div class="text-[11px] font-semibold text-sub px-1 pt-0.5">+${ps.length-3} mais</div>` : '';

    html += `
      <div class="day-cell ${borders} min-h-[116px] p-1.5 flex flex-col gap-1 hover:bg-accents/40 transition cursor-pointer group" data-day="${dateStr}">
        <div class="flex items-center justify-between px-1 pt-0.5">
          ${numEl}
          <button class="edit-only opacity-0 group-hover:opacity-100 w-5 h-5 grid place-items-center rounded-md text-sub hover:text-accent hover:bg-accents transition no-print" data-quickadd="${dateStr}" title="Adicionar">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
        <div class="flex flex-col gap-1 overflow-hidden">${shown}${more}</div>
      </div>`;
  }
  $('#daysGrid').innerHTML = html;
}

function postChip(p) {
  const f = FORMATS[p.format] || FORMATS.estatico;
  const s = STATUSES[p.status] || STATUSES.ideia;
  const thumb = p.image
    ? `<span class="w-6 h-6 rounded-md bg-cover bg-center shrink-0 border border-black/5" style="background-image:url('${p.image}')"></span>`
    : (p.video
        ? `<span class="w-6 h-6 rounded-md grid place-items-center shrink-0 text-white" style="background:${f.dot}">${fmtIcon('reels','w-3 h-3')}</span>`
        : `<span class="w-6 h-6 rounded-md grid place-items-center shrink-0" style="background:${f.bg};color:${f.fg}">${fmtIcon(p.format,'w-3 h-3')}</span>`);
  const time = p.time ? `<span class="text-[10px] font-mono text-faint shrink-0">${esc(p.time)}</span>` : '';
  const title = p.caption ? esc(p.caption) : (p.objective ? esc(p.objective) : f.label);
  return `
    <button data-post="${p.id}" class="w-full text-left flex items-center gap-1.5 px-1 py-1 rounded-lg hover:bg-card hover:shadow-sm border border-transparent hover:border-line transition group/chip">

          <span class="text-[10px] text-sub truncate leading-tight">${s.label}</span>
        </span>
      </span>

}

  $('#agendaList').innerHTML = html;
}
function agendaRow(p) {

function wireViewer(id) {
  const approve = $('#fbApprove'), adjust = $('#fbAdjust'), comment = $('#fbComment');
  if (approve) approve.addEventListener('click', () => {
    setApproval(id, 'aprovado');
    refreshAfterFeedback();
    toast('Postagem aprovada ✓');
  });
  if (adjust) adjust.addEventListener('click', () => {
    openFeedbackModal({
      title: 'Solicitar ajuste', confirm: 'Enviar ajuste', requireText: true,
      hint: 'Descreva o que precisa ser alterado nesta postagem.',
      onConfirm: (t) => { setApproval(id, 'ajuste'); addNote(id, t); },
      toast: 'Ajuste solicitado'
    });
  });
  if (comment) comment.addEventListener('click', () => {
    openFeedbackModal({
      title: 'Comentário', confirm: 'Enviar comentário', requireText: true,
      hint: 'Sua observação ficará registrada para o social media.',
      onConfirm: (t) => { addNote(id, t); },
      toast: 'Comentário enviado'
    });
  });
}
function refreshAfterFeedback() {
  if (editing) renderEditor();
  render();
  updateClientBanner();
  syncFeedbackToServerIfLinked();
}

function wireEditor() {
  $('#fmtGroup').querySelectorAll('[data-fmt]').forEach(b => {
    b.addEventListener('click', () => { editing.format = b.dataset.fmt; renderEditor(); });
  });
  const imgInput = $('#imgInput');
  $('#imgDrop').addEventListener('click', e => { if (e.target.closest('#imgRemove')) return; imgInput.click(); });
  imgInput.addEventListener('change', e => handleFile(e.target.files[0], 'image'));
  setupDrop($('#imgDrop'), 'image');
  const imgRemove = $('#imgRemove');
  if (imgRemove) imgRemove.addEventListener('click', e => { e.stopPropagation(); editing.image=''; renderEditor(); });
  const vidInput = $('#vidInput');
  const vidDrop = $('#vidDrop');
  if (vidDrop) { vidDrop.addEventListener('click', () => vidInput.click()); setupDrop(vidDrop, 'video'); }
  vidInput.addEventListener('change', e => handleFile(e.target.files[0], 'video'));
  const vidRemove = $('#vidRemove');
  if (vidRemove) vidRemove.addEventListener('click', e => { e.stopPropagation(); editing.video=''; renderEditor(); });
  const bind = (id, key) => { const el = $(id); if (el) el.addEventListener('input', () => editing[key] = el.value); };
  bind('#fTime','time'); bind('#fCaption','caption'); bind('#fBriefing','briefing');
  bind('#fHashtags','hashtags'); bind('#fObjective','objective'); bind('#fAudio','audio');
  $('#fStatus').addEventListener('change', e => editing.status = e.target.value);
  $('#fPlatform').addEventListener('change', e => editing.platform = e.target.value);
  $('#fDate').addEventListener('change', e => editing.date = e.target.value);
}

function setupDrop(el, kind) {
  if (!el) return;
  ['dragenter','dragover'].forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); el.classList.add('border-accent'); }));
  ['dragleave','drop'].forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); el.classList.remove('border-accent'); }));
  el.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) handleFile(f, kind); });
}
function handleFile(file, kind) {
  if (!file) return;
  if (kind === 'image' && !file.type.startsWith('image/')) { toast('Selecione um arquivo de imagem'); return; }
  if (kind === 'video' && !file.type.startsWith('video/')) { toast('Selecione um arquivo de vídeo'); return; }
  if (file.size > 8 * 1024 * 1024) { toast('Arquivo grande — pode pesar no navegador'); }
  const reader = new FileReader();
  reader.onload = () => { editing[kind] = reader.result; renderEditor(); };
  reader.readAsDataURL(file);
}

function persistEditing() {
  const idx = state.posts.findIndex(p => p.id === editing.id);
  if (idx >= 0) state.posts[idx] = editing; else state.posts.push(editing);
  save();
}

function enterPresent() {

function enterClient() {

  document.body.classList.add('present', 'client');
  $('#clientBanner').classList.remove('hidden');
  $('#btnExit').classList.toggle('hidden', !!window.__SHARED__);

function exitView() {
  if (window.__SHARED__) return;
  readonly = false; clientMode = false;
  document.body.classList.remove('present', 'client');
  $('#clientBanner').classList.add('hidden');
  $('#btnExit').classList.add('hidden');

}
function updateClientBanner() {
  const counts = { aprovado:0, aguardando:0, ajuste:0 };
  state.posts.forEach(p => counts[getApproval(p.id)]++);
  $('#approvalSummary').innerHTML = [['aprovado',counts.aprovado],['ajuste',counts.ajuste],['aguardando',counts.aguardando]]
    .map(([k,n]) => `<span class="inline-flex items-center gap-1.5" style="color:${APPROVAL[k].fg}"><span class="w-2 h-2 rounded-full" style="background:${APPROVAL[k].dot}"></span>${n} ${APPROVAL[k].label}</span>`).join('');
}

let fbAction = null;
function openFeedbackModal(opts) {
  fbAction = opts;
  $('#fbTitle').textContent = opts.title;
  $('#fbConfirm').textContent = opts.confirm || 'Enviar';
  $('#fbHint').textContent = opts.hint || '';
  $('#fbText').value = '';
  $('#fbText').classList.remove('border-red-400');
  showModal('#fbModal');
  setTimeout(() => $('#fbText').focus(), 60);
}
function downloadFeedback() {
  const blob = new Blob([JSON.stringify({ feedback }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'feedback-cliente.json'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Feedback exportado — envie ao social media');
}
function importFeedback(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      const incoming = obj.feedback || obj;
      Object.keys(incoming).forEach(id => { feedback[id] = incoming[id]; });
      saveFeedback(); render();
      toast('Feedback do cliente importado');
    } catch(e) { toast('Arquivo inválido'); }
  };
  reader.readAsText(file);
}

function exportPDF() { window.print(); }

function exportHTML() {
  const data = JSON.stringify({ title: state.title, sub: state.sub, posts: state.posts });
  const clone = document.documentElement.cloneNode(true);
  clone.querySelectorAll('#shared-data, #toast').forEach(n => n.remove());
  clone.querySelectorAll('#dayModal, #editorModal, #fbModal').forEach(n => n.classList.add('hidden'));
  const head = clone.querySelector('head');
  const s = document.createElement('script');
  s.id = 'shared-data';
  s.textContent = 'window.__SHARED__ = ' + data + ';\nwindow.__FEEDBACK__ = ' + JSON.stringify(feedback) + ';';
  head.appendChild(s);
  const html = '<!doctype html>\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const name = (state.title || 'calendario').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  a.href = url; a.download = `${name}-cliente.html`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Arquivo gerado — pronto para enviar');
}

function wireGlobal() {
  $('#prevM').addEventListener('click', () => { view.m--; if (view.m<0){view.m=11;view.y--;} render(); });
  $('#nextM').addEventListener('click', () => { view.m++; if (view.m>11){view.m=0;view.y++;} render(); });
  $('#todayBtn').addEventListener('click', () => { view = { y: today.getFullYear(), m: today.getMonth() }; render(); });

  $('#addBtn').addEventListener('click', () => openEditor(null, ymd(view.y, view.m, isToday(view.y,view.m,today.getDate())?today.getDate():1)));
  $('#dayAddPost').addEventListener('click', () => openEditor(null, activeDate));

  document.addEventListener('click', e => {
    const postBtn = e.target.closest('[data-post]');
    const quickAdd = e.target.closest('[data-quickadd]');
    const dayEl = e.target.closest('[data-day]');
    if (quickAdd && !readonly) { e.stopPropagation(); activeDate = quickAdd.dataset.quickadd; openEditor(null, activeDate); return; }
    if (postBtn) {
      e.stopPropagation();
      const p = state.posts.find(x => x.id === postBtn.dataset.post);
      if (p) { activeDate = p.date; openEditor(p); }
      return;
    }
    if (dayEl && dayEl.dataset.day) { openDay(dayEl.dataset.day); }
  });

  document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', () => {
    if (b.closest('#fbModal')) hideModal('#fbModal');
    else if (b.closest('#editorModal')) hideModal('#editorModal');
    else if (b.closest('#dayModal')) hideModal('#dayModal');
  }));
  document.querySelectorAll('.modal-scrim').forEach(s => s.addEventListener('click', () => {
    if (s.closest('#fbModal')) hideModal('#fbModal');
    else if (s.closest('#editorModal')) hideModal('#editorModal');
    else if (s.closest('#dayModal')) hideModal('#dayModal');
  }));
  $('#editorBack').addEventListener('click', () => { hideModal('#editorModal'); });

  $('#savePost').addEventListener('click', () => {
    persistEditing();
    hideModal('#editorModal');
    render();
    if (!$('#dayModal').classList.contains('hidden')) { activeDate = editing.date; renderDayBody(); openDayHeader(editing.date); }
    toast('Postagem salva');
  });
  $('#deletePost').addEventListener('click', () => {
    state.posts = state.posts.filter(p => p.id !== editing.id);
    save(); hideModal('#editorModal'); render();
    if (!$('#dayModal').classList.contains('hidden')) renderDayBody();
    toast('Postagem excluída');
  });

  $('#btnPresent').addEventListener('click', enterPresent);
  $('#btnClient').addEventListener('click', enterClient);
  $('#btnExit').addEventListener('click', exitView);
  $('#btnDownloadFb').addEventListener('click', downloadFeedback);
  $('#fbImport').addEventListener('change', e => { importFeedback(e.target.files[0]); e.target.value=''; });
  $('#fbConfirm').addEventListener('click', () => {
    const t = $('#fbText').value.trim();
    if (fbAction && fbAction.requireText && !t) { $('#fbText').classList.add('border-red-400'); $('#fbText').focus(); return; }
    if (fbAction && fbAction.onConfirm) fbAction.onConfirm(t);
    hideModal('#fbModal');
    refreshAfterFeedback();
    toast((fbAction && fbAction.toast) || 'Feedback salvo');
  });
  $('#btnShare').addEventListener('click', e => { e.stopPropagation(); $('#shareMenu').classList.toggle('hidden'); });
  document.addEventListener('click', e => { if (!e.target.closest('#btnShare') && !e.target.closest('#shareMenu')) $('#shareMenu').classList.add('hidden'); });
  $('#shareMenu').querySelectorAll('[data-share]').forEach(b => b.addEventListener('click', () => {
    $('#shareMenu').classList.add('hidden');
    const a = b.dataset.share;
    if (a==='html') exportHTML();
    else if (a==='pdf') exportPDF();
    else if (a==='present') enterPresent();
    else if (a==='import') $('#fbImport').click();
    else if (a==='clientlink') copyClientLink();
  }));

  ['#docTitle','#docSub'].forEach(sel => {
    const el = $(sel);
    el.addEventListener('focus', () => { if (readonly) el.blur(); });
    el.addEventListener('blur', () => {
      if (readonly) return;
      if (sel==='#docTitle') state.title = el.textContent.trim() || 'Calendário de Conteúdo';
      else state.sub = el.textContent.trim();
      save();
    });
    el.addEventListener('keydown', e => { if (e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (!$('#editorModal').classList.contains('hidden')) hideModal('#editorModal');
      else if (!$('#dayModal').classList.contains('hidden')) hideModal('#dayModal');
    }
  });
}
function openDayHeader(dateStr){ const d = parseYMD(dateStr); $('#dayModalWeekday').textContent = WEEKDAYS_FULL[d.getDay()]; $('#dayModalDate').textContent = `${d.getDate()} de ${MONTHS[d.getMonth()]}`; }

/* ============================================================
   INIT
============================================================ */
function applyEditableState() {
  const editableAttr = readonly ? 'false' : 'true';
  ['#docTitle','#docSub'].forEach(sel => {
    const el = $(sel);
    el.setAttribute('contenteditable', editableAttr);
    el.classList.toggle('editing', !readonly);
  });
}

(async function init() {
  // Link fixo do cliente (?c=TOKEN): busca a versão mais recente no servidor.
  // Sem esse parâmetro, ou se a busca falhar, o fluxo original roda sem alteração.
  const params = new URLSearchParams(location.search);
  const clientToken = params.get('c');
  if (clientToken) {
    loadFeedback();
    const ok = await loadFromClientToken(clientToken);
    if (ok) {
      render();
      wireGlobal();
      applyEditableState();
      enterClient();
      return;
    }
    toast('Link inválido ou expirado');
  }

  load();
  render();
  wireGlobal();
  applyEditableState();
  if (clientMode) enterClient();
  else if (readonly) enterPresent();
})();
</script>
